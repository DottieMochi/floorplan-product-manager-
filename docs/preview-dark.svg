<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" font-family="-apple-system,BlinkMacSystemFont,'Microsoft YaHei',sans-serif">
  <title>区域导航 · 深色界面预览</title>
  <rect width="880" height="600" fill="#131316"/>
  <rect x="20" y="20" width="840" height="560" rx="18" fill="#1e1e22" stroke="#313137"/>

  <!-- nav -->
  <rect x="44" y="40" width="40" height="34" rx="8" fill="#2a1c10" stroke="#5a3a1c"/>
  <rect x="55" y="50" width="18" height="14" rx="2" fill="#f97316"/>
  <text x="94" y="64" font-size="22" font-weight="600" fill="#f1f1f3">区域导航</text>
  <circle cx="690" cy="57" r="17" fill="#26262b" stroke="#313137"/>
  <path d="M684 57a6 6 0 1 1 2 4" fill="none" stroke="#a7a7af" stroke-width="2"/>
  <circle cx="730" cy="57" r="17" fill="#26262b" stroke="#313137"/>
  <rect x="722" y="51" width="16" height="11" rx="2" fill="none" stroke="#a7a7af" stroke-width="2"/>
  <rect x="762" y="42" width="74" height="30" rx="15" fill="#f97316"/>
  <circle cx="780" cy="57" r="5" fill="#fff"/><path d="M773 65a7 5 0 0 1 14 0" fill="#fff"/>
  <text x="794" y="61" font-size="13" fill="#fff">游客</text>

  <!-- search -->
  <rect x="44" y="92" width="792" height="44" rx="22" fill="#1e1e22" stroke="#313137"/>
  <text x="68" y="120" font-size="15" fill="#8a8a92">搜索商品名/条码…</text>
  <circle cx="812" cy="114" r="17" fill="#f97316"/>
  <circle cx="809" cy="111" r="5" fill="none" stroke="#fff" stroke-width="2"/><line x1="813" y1="115" x2="818" y2="120" stroke="#fff" stroke-width="2"/>

  <!-- canvas -->
  <rect x="44" y="152" width="792" height="316" rx="14" fill="#1a1a1e" stroke="#313137"/>
  <rect x="92" y="196" width="150" height="92" rx="6" fill="#3498db"/>
  <text x="167" y="248" font-size="16" fill="#fff" text-anchor="middle">入口</text>
  <rect x="300" y="206" width="172" height="110" rx="18" fill="#2ecc71"/>
  <text x="386" y="266" font-size="16" fill="#fff" text-anchor="middle">货架 A</text>
  <ellipse cx="600" cy="246" rx="84" ry="58" fill="#e67e22"/>
  <text x="600" y="252" font-size="16" fill="#fff" text-anchor="middle">促销岛</text>
  <g transform="translate(300,360)">
    <polygon points="60,0 120,40 60,80 0,40" fill="#9b59b6"/>
    <text x="60" y="46" font-size="15" fill="#fff" text-anchor="middle">收银</text>
  </g>
  <rect x="724" y="392" width="92" height="60" rx="8" fill="#1c1c20" stroke="#f97316" stroke-opacity="0.5"/>

  <!-- toolbar -->
  <rect x="44" y="486" width="792" height="74" rx="14" fill="#1a1a1e" stroke="#313137"/>
  <g font-size="14" fill="#fff" text-anchor="middle">
    <rect x="180" y="510" width="120" height="36" rx="10" fill="#2563eb"/><text x="240" y="533">导出</text>
    <rect x="312" y="510" width="120" height="36" rx="10" fill="#059669"/><text x="372" y="533">导入</text>
    <rect x="444" y="510" width="140" height="36" rx="10" fill="#64748b"/><text x="514" y="533">重置视图</text>
    <rect x="596" y="510" width="140" height="36" rx="10" fill="#f97316"/><text x="666" y="533">添加区域</text>
  </g>
</svg>
